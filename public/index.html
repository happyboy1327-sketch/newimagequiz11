<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랜덤 위인 퀴즈</title>
<style>
  body{font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f2f5; margin:0;}
  .card{width:90%; max-width:420px; background:#fff; border-radius:16px; padding:24px; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,0.1);}

  .img-box {width:100%; height:320px; margin-bottom:16px; border-radius:12px; background:#f8f9fa; overflow:hidden; position:relative;}
  img {width:100%; height:100%; object-fit:contain; display:block; opacity:1; transition:opacity .15s ease; transform:translateZ(0);}
  img.is-loading {opacity:0;}

  #hint {margin:12px 0; font-size:0.95rem; color:#495057; background:#e9ecef; padding:12px; border-radius:8px; line-height:1.5; word-break:keep-all;}

  input {width:100%; padding:14px; margin-bottom:12px; border-radius:8px; border:1px solid #ced4da; font-size:1rem; box-sizing:border-box; outline:none;}
  input:focus {border-color:#4c6ef5; box-shadow:0 0 0 3px rgba(76,110,245,0.2);}

  .btn-group {display:flex; gap:8px;}
  button {flex:1; padding:14px; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-size:1rem; color:#fff;}
  #checkBtn {background:#a4fa23;}
  #checkBtn:hover {background:#2ffc52;}
  #reloadBtn {background:#38ebf4;}
  #reloadBtn:hover {background:#368df1;}
  button:disabled {background:#dee2e6; cursor:not-allowed;}

  #timer {font-weight:800; color:#fa5252; margin-bottom:8px; font-size:1.4rem;}

  #result {margin-top:20px; text-align:left;}
  .res-header {font-size:1.2rem; font-weight:800; margin-bottom:8px; text-align:center;}
  .desc-box {font-size:0.9rem; color:#343a40; background:#f1f3f5; padding:12px; border-radius:8px; line-height:1.6;}
</style>
</head>
<body>

<div class="card">
  <h2>랜덤 위인 퀴즈</h2>
  <div id="timer">15s</div>

  <div class="img-box">
    <img id="person-img" src="" alt="위인 이미지" referrerpolicy="no-referrer">
  </div>

  <div id="hint">데이터 검증 및 수신 중...</div>

  <input id="answer" placeholder="정답 입력" autocomplete="off">

  <div class="btn-group">
    <button id="checkBtn" disabled>정답 확인</button>
    <button id="reloadBtn">다음 문제</button>
  </div>

  <div id="result"></div>
</div>

<script>
const ANSWER_TIME = 15;
const MAX_RETRY = 3;
const IMAGE_LOAD_TIMEOUT_MS = 12000;
const RETRY_DELAY_MS = 250;

const LOADING_IMG = "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";

const els = {
  img: document.getElementById('person-img'),
  hint: document.getElementById('hint'),
  answer: document.getElementById('answer'),
  checkBtn: document.getElementById('checkBtn'),
  reloadBtn: document.getElementById('reloadBtn'),
  result: document.getElementById('result'),
  timer: document.getElementById('timer')
};

let retryCount = 0;
let sessionId = localStorage.getItem('sessionId') || `session_${Date.now()}`;
localStorage.setItem('sessionId', sessionId);

let currentData = null;
let timer = null;
let timeLeft = ANSWER_TIME;
let activeLoadId = 0;
let activeAbortController = null;
let imageLoadTimeout = null;
let retryTimer = null;
let isLoading = false;

function setButtons(loading) {
  isLoading = loading;
  els.checkBtn.disabled = loading || !currentData;
  els.reloadBtn.disabled = loading;
}

function resetQuestionUI() {
  clearInterval(timer);
  clearTimeout(imageLoadTimeout);
  clearTimeout(retryTimer);

  currentData = null;
  timeLeft = ANSWER_TIME;
  els.timer.textContent = `${timeLeft}s`;
  els.result.innerHTML = "";
  els.answer.value = "";
  els.answer.focus();

  els.img.classList.add('is-loading');
  els.img.src = LOADING_IMG;

  setButtons(true);
}

// ★ 함수 매개변수에 isRetry = false 추가 (재시도 호출인지 유저 클릭인지 구분)
async function loadQuiz(isRetry = false) {
  
  // ★ 1. 유저가 직접 누른 건데 이미 로딩 중이면 문구 띄우고 커트
  if (!isRetry && isLoading) {
    els.hint.textContent = "이미 처리 중입니다. 잠시만 기다려주세요.";
    return;
  }

  // ★ 2. 시작하자마자 버튼을 잠그고 isLoading을 true로 변경
  setButtons(true);

  const loadId = ++activeLoadId;

  if (activeAbortController) {
    activeAbortController.abort();
  }
  activeAbortController = new AbortController();

  resetQuestionUI();
  els.hint.textContent = "최적의 이미지를 선별하고 있습니다...";

  try {
    const res = await fetch(`/api/quiz?sessionId=${encodeURIComponent(sessionId)}&t=${Date.now()}`, {
      cache: 'no-store',
      signal: activeAbortController.signal
    });

    if (loadId !== activeLoadId) return;

    if (res.status === 503) {
      els.hint.textContent = "적절한 이미지 찾는 중... 잠시 후 '다음 문제'를 눌러주세요.";
      setButtons(false); // 여기서 버튼 풀리고 isLoading = false 됨
      return;
    }

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}`);
    }

    const data = await res.json();
    if (loadId !== activeLoadId) return;
    if (data.error) throw new Error(data.error);

    currentData = data;
    els.hint.textContent = data.hint || "";

    const preloader = new Image();
    preloader.decoding = "async";
    preloader.fetchPriority = "high";
    preloader.referrerPolicy = "no-referrer";

    let settled = false;

    const finalizeReady = () => {
      if (settled || loadId !== activeLoadId) return;
      settled = true;
      clearTimeout(imageLoadTimeout);

      els.img.src = preloader.src;
      els.img.classList.remove('is-loading');

      retryCount = 0;
      setButtons(false); // 성공했으니 잠금 해제
      startTimer();
    };

    const retryLoad = () => {
      if (settled || loadId !== activeLoadId) return;
      settled = true;
      clearTimeout(imageLoadTimeout);

      retryCount += 1;
      if (retryCount > MAX_RETRY) {
        els.hint.textContent = "이미지 불안정으로 로드 실패. 다시 시도해주세요.";
        setButtons(false); // 완전히 실패했으니 잠금 해제
        return;
      }

      retryTimer = setTimeout(() => {
        // ★ 3. 시스템이 자동으로 재시도할 때는 true를 넘겨서 위의 연타 락을 우회함
        if (loadId === activeLoadId) loadQuiz(true); 
      }, RETRY_DELAY_MS);
    };

    preloader.onload = finalizeReady;
    preloader.onerror = retryLoad;
    preloader.src = data.image;

    imageLoadTimeout = setTimeout(() => {
      retryLoad();
    }, IMAGE_LOAD_TIMEOUT_MS);

    if (preloader.complete && preloader.naturalWidth > 0) {
      finalizeReady();
    }
  } catch (e) {
    if (e && e.name === 'AbortError') return;
    console.error(e);

    if (loadId !== activeLoadId) return;
    els.hint.textContent = "오류가 발생했습니다.";
    setButtons(false); // 에러 났으니 다시 누를 수 있게 잠금 해제
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft -= 1;
    els.timer.textContent = `${timeLeft}s`;

    if (timeLeft <= 0) {
      clearInterval(timer);
      showResult(false, true);
    }
  }, 1000);
}

function showResult(isCorrect, isTimeout = false) {
  clearInterval(timer);
  setButtons(false);

  const color = isCorrect ? "#40c057" : "#fa5252";
  const title = isTimeout ? "⏰ 시간 초과" : (isCorrect ? "🎉 정답!" : "❌ 아닙니다!");

  els.result.innerHTML = `
    <div class="res-header" style="color:${color}">${title}</div>
    <div class="res-header">${currentData.name}</div>
    <div class="desc-box">${currentData.description}</div>
  `;
}

els.checkBtn.addEventListener('click', () => {
  if (!currentData || isLoading) return;

  const user = els.answer.value.replace(/\s+/g, '').trim();
  const correct = currentData.name.replace(/\s+/g, '').trim();
  if (!user) return alert("답을 입력하세요");

  showResult(user === correct);
});

els.reloadBtn.addEventListener('click', () => {
  if (isLoading) return;
  loadQuiz();
});

els.answer.addEventListener('keydown', (e) => {
  if (e.key === "Enter") els.checkBtn.click();
});

els.img.addEventListener('error', () => {
  // 실제 표시용 이미지가 깨지면 다음 로드를 기다리지 않고 재시도
  if (!isLoading) return;
});

window.addEventListener('load', loadQuiz);
</script>
</body>
</html>
